<!-- Contains the user button -->
<div>
  <!-- Calls onSelectUser() when the button is clicked -->
  <button (click)="onSelectUser()">

    <!-- Shows the selected user's image -->
    <img
      [src]="imagePath"
      [alt]="selectedUser().name"
    />

    <!-- Shows the selected user's name -->
    <span>{{ selectedUser().name }}</span>

  </button>
</div>
